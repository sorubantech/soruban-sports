<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soruban Sports — Student & Parent App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="../shared/design-system.css">
  <link rel="stylesheet" href="../shared/phone-frame.css">
  <link rel="stylesheet" href="../shared/components.css">
  <link rel="stylesheet" href="../shared/animations.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-container">
    <div class="phone-frame">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="status-icons">
          <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full battery"></i>
        </div>
      </div>
      <div class="screen-content" id="screen-content"></div>
      <div class="bottom-nav" id="bottom-nav">
        <div class="nav-item active" data-tab="home" onclick="navigateTo('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" data-tab="learn" onclick="navigateTo('learn')"><i class="fas fa-book-open"></i><span>Learn</span></div>
        <div class="nav-item" data-tab="feed" onclick="navigateTo('feed')"><i class="fas fa-newspaper"></i><span>Feed</span></div>
        <div class="nav-item" data-tab="play" onclick="navigateTo('play')"><i class="fas fa-trophy"></i><span>Play</span></div>
        <div class="nav-item" data-tab="more" onclick="navigateTo('more')"><i class="fas fa-bars"></i><span>More</span></div>
      </div>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  <script src="../shared/nav-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
