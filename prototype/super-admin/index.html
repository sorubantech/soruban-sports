<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soruban Sports — Super Admin</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../shared/design-system.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo-section">
        <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <div class="logo-text">
          <span class="logo-title">Soruban Sports</span>
          <span class="logo-subtitle">Super Admin</span>
        </div>
        <button class="sidebar-close" id="sidebar-close" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard" onclick="navigateAdmin('dashboard')">
          <i class="fa-solid fa-chart-pie"></i><span>Dashboard</span>
        </a>
        <a class="nav-item" data-page="academies" onclick="navigateAdmin('academies')">
          <i class="fa-solid fa-building-columns"></i><span>Academies</span>
        </a>
        <a class="nav-item" data-page="content-library" onclick="navigateAdmin('content-library')">
          <i class="fa-solid fa-photo-film"></i><span>Content Library</span>
        </a>
        <a class="nav-item" data-page="users" onclick="navigateAdmin('users')">
          <i class="fa-solid fa-users"></i><span>Users</span>
        </a>
        <a class="nav-item" data-page="billing" onclick="navigateAdmin('billing')">
          <i class="fa-solid fa-credit-card"></i><span>Subscriptions & Billing</span>
        </a>
        <a class="nav-item" data-page="tournaments" onclick="navigateAdmin('tournaments')">
          <i class="fa-solid fa-trophy"></i><span>Tournaments</span>
        </a>
        <a class="nav-item" data-page="reports" onclick="navigateAdmin('reports')">
          <i class="fa-solid fa-chart-line"></i><span>Reports & Analytics</span>
        </a>
        <a class="nav-item" data-page="support" onclick="navigateAdmin('support')">
          <i class="fa-solid fa-headset"></i><span>Support Tickets</span>
        </a>
        <a class="nav-item" data-page="config" onclick="navigateAdmin('config')">
          <i class="fa-solid fa-sliders"></i><span>System Config</span>
        </a>
        <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;">
          <a class="nav-item" onclick="window.location.href='../landing/index.html'" style="opacity:0.7;">
            <i class="fa-solid fa-th-large"></i><span>App Selector</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h1 class="top-bar-title">Soruban Sports Super Admin</h1>
        </div>
        <div class="top-bar-right">
          <div class="search-input">
            <i class="fa-solid fa-search"></i>
            <input type="text" placeholder="Search academies, users..." id="global-search">
          </div>
          <button class="top-bar-icon" onclick="showToast('Notifications panel coming soon!')">
            <i class="fa-solid fa-bell"></i>
            <span class="alert-badge">3</span>
          </button>
          <div class="admin-profile">
            <div class="admin-avatar">SA</div>
            <span class="admin-label">Super Admin</span>
          </div>
          <button class="top-bar-icon theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
          </button>
        </div>
      </header>

      <div class="page-content" id="page-content">
        <!-- Dynamic content rendered by app.js -->
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
